<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — Oleksii Berliziev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Archivo', 'sans-serif'],
            body: ['Space Grotesk', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --amber: #F59E0B;
      --amber-light: #FBBF24;
      --amber-dark: #D97706;
      --bg: #080810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-amber: rgba(245,158,11,0.3);
    }

    * { box-sizing: border-box; }
    body {
      background-color: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: #F8FAFC;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--amber-dark); border-radius: 4px; }

    /* Glass */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
    }
    .glass-amber {
      background: rgba(245,158,11,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-amber);
    }

    /* Dot grid */
    .dot-grid {
      background-image: radial-gradient(rgba(245,158,11,0.15) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Gradient text */
    .text-gradient {
      background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 50%, #D97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Ambient blob */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    /* Filter pill buttons */
    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: all 0.18s ease;
      user-select: none;
      white-space: nowrap;
    }
    .filter-pill:hover {
      background: rgba(245,158,11,0.08);
      border-color: rgba(245,158,11,0.25);
      color: #FBBF24;
    }
    .filter-pill.active {
      background: rgba(245,158,11,0.14);
      border-color: rgba(245,158,11,0.45);
      color: #F59E0B;
      font-weight: 600;
    }
    .filter-pill.active .pill-check { display: inline; }
    .filter-pill .pill-check { display: none; }

    /* Search */
    .search-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
    }

    /* Active filter chip (row under search) */
    .active-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      color: #FBBF24;
      cursor: pointer;
      transition: background 0.15s;
    }
    .active-chip:hover { background: rgba(245,158,11,0.2); }
    .active-chip svg { opacity: 0.7; }

    /* Tag chip */
    .tag {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      color: #FBBF24;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 5px;
    }
    .tag-neutral {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 5px;
    }
    .tag-green {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #4ade80;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 5px;
    }

    /* Stack chip */
    .stack-chip {
      padding: 4px 10px;
      border-radius: 7px;
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      color: rgba(255,255,255,0.6);
    }

    /* Project card */
    .project-card {
      transition: border-color 0.25s ease;
    }
    .project-card:hover {
      border-color: rgba(245,158,11,0.2);
    }

    /* Sidebar sticky */
    .filter-sidebar {
      position: sticky;
      top: 88px;
      max-height: calc(100vh - 104px);
      overflow-y: auto;
    }
    .filter-sidebar::-webkit-scrollbar { width: 2px; }
    .filter-sidebar::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.2); }

    /* Filter group */
    .filter-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .filter-group-header .chevron {
      transition: transform 0.2s;
      color: rgba(255,255,255,0.3);
    }
    .filter-group-header.collapsed .chevron { transform: rotate(-90deg); }
    .filter-group-content { overflow: hidden; }

    /* Mobile filter panel */
    .filter-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 40;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .filter-overlay.open { opacity: 1; pointer-events: all; }
    .filter-panel {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(320px, 90vw);
      z-index: 50;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
      background: #0D0D18;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .filter-panel.open { transform: translateX(0); }

    /* Expand/collapse project details */
    .project-details {
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    /* Entrance animation */
    .project-card {
      animation: cardIn 0.4s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Empty state */
    #empty-state { display: none; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* ── Link strip ──────────────────────────────────────────────────── */
    .link-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    /* Web / live link */
    .link-web {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 16px;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(245,158,11,0.08);
      border: 1px solid rgba(245,158,11,0.22);
      color: #FBBF24;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .link-web:hover {
      background: rgba(245,158,11,0.15);
      border-color: rgba(245,158,11,0.45);
      transform: translateY(-1px);
    }
    .link-web svg { flex-shrink: 0; }

    /* App store buttons */
    .link-store {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 7px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      cursor: pointer;
    }
    .link-store:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }
    .link-store .store-icon { flex-shrink: 0; color: rgba(255,255,255,0.55); }
    .link-store .store-label-top {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.3);
      line-height: 1;
      margin-bottom: 1px;
      display: block;
    }
    .link-store .store-label-main {
      font-size: 0.78rem;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      line-height: 1;
      display: block;
    }

    /* Private / NDA */
    .link-private-wrap {
      position: relative;
      display: inline-flex;
    }
    .link-private {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.28);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: not-allowed;
      user-select: none;
    }
    .link-private svg { flex-shrink: 0; }
    .link-private-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #16162a;
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);
      font-size: 0.68rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 8px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
      z-index: 10;
    }
    .link-private-wrap:hover .link-private-tooltip { opacity: 1; }

    /* Link type label (dim helper text) */
    .link-type-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      margin-right: 2px;
    }

    @media (max-width: 640px) {
      .link-strip { flex-direction: column; align-items: stretch; }
      .link-web { justify-content: center; }
      .link-store { justify-content: center; }
      .link-private-wrap { width: 100%; }
      .link-private { justify-content: center; width: 100%; }
      .link-private-tooltip { left: 50%; }
    }
  </style>
</head>
<body>

<!-- Background blobs -->
<div class="blob w-[500px] h-[500px] bg-amber-500" style="top:-100px;right:-100px"></div>
<div class="blob w-[400px] h-[400px] bg-amber-600" style="bottom:0;left:-80px"></div>

<!-- ═══════════════════════════════════════════

<nav class="fixed top-4 left-4 right-4 z-30">

<!-- ═══════════════════════════════════════════

<main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-28 pb-20">

  <!-- Page header -->
  <div class="mb-10">

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════
const PROJECTS = [
  {
    id: 1,
    title: 'Omega European Masters',
    industry: 'Sports',
    company: 'Allsquare',
    productType: 'SaaS',
    devTypes: ['Full Stack'],
    role: 'Tech Lead',
    skills: 'Full ownership',
    teamLabel: '7–11',
    teamDetail: '2–5 devs · 1–2 QA · 2 BA · 1 PO · 1 PM',
    scale: 'Team',
    description: 'Applications for handling golf tournament and related activities. Includes ticket selling, ticketing system, page building system (customers can tweak the whole system without involving the dev team, unless something unusual is needed), leaderboard, history, and more.',
    achievements: [
      'Platform handled 5,000+ concurrent users',
    ],
    duties: [
      'Architecture of the platform',
      'Web app development',
      'Mobile application development (during last year completely solo)',
      'Backend development (almost completely solo)',
      'Highload optimization',
      'Deployment infrastructure setup and support',
      'CircleCI builds automation',
      'Code review',
    ],
    stack: ['React Native', 'OneSignal', 'Next.js', 'NestJS', 'Apollo Client/Server', 'PostgreSQL', 'Prisma'],
    stackFilters: ['React Native', 'Next.js', 'NestJS', 'GraphQL'],
    year: '2021–2024',
    link: { type: 'web+mobile', webUrl: 'https://omegaeuropeanmasters.com', appStore: 'https://apps.apple.com', googlePlay: 'https://play.google.com' },
  },
  {
    id: 2,
    title: 'Golfcrans',
    industry: 'Sports',
    company: 'Avocado Technologies',
    productType: 'SaaS',
    devTypes: ['Mobile'],
    role: 'Mobile Lead',
    skills: 'Mobile app development',
    teamLabel: '8',
    teamDetail: '2 mobile devs · 1 backend · 1–2 QA · 2 BA · 1 PM',
    scale: 'Team',
    description: 'Golf-club application with booking features and integrated payments. Built from the ground up with a focus on performance and offline reliability.',
    achievements: [
      'Platform handled 5,000+ concurrent users',
    ],
    duties: [
      'Mobile app architecture',
      'Mobile app development',
      'Code review',
    ],
    stack: ['React Native', 'React Query', 'REST APIs', 'TypeScript'],
    stackFilters: ['React Native'],
    year: '2020–2021',
    link: { type: 'mobile', appStore: 'https://apps.apple.com', googlePlay: 'https://play.google.com' },
  },
  {
    id: 3,
    title: 'Fintech Trading Dashboard',
    industry: 'Fintech',
    company: 'Confidential',
    productType: 'SaaS',
    devTypes: ['Full Stack'],
    role: 'Tech Lead',
    skills: 'Full ownership',
    teamLabel: '6',
    teamDetail: '2 devs · 1 QA · 1 BA · 1 PO · 1 PM',
    scale: 'Team',
    description: 'Real-time trading analytics platform with live market data feeds, portfolio tracking, and compliance reporting. Built for institutional clients under strict regulatory requirements.',
    achievements: [
      'Sub-200ms data refresh across 50k+ data points',
    ],
    duties: [
      'System architecture and technical decisions',
      'Real-time WebSocket data pipeline',
      'Frontend dashboard development',
      'Compliance reporting module',
      'Performance optimisation',
      'Code review and team mentoring',
    ],
    stack: ['Next.js', 'NestJS', 'PostgreSQL', 'Redis', 'TypeScript', 'WebSocket'],
    stackFilters: ['NestJS', 'Next.js'],
    year: '2022–2023',
    link: { type: 'private', label: 'Private — NDA' },
  },
];

// ════════════════════════════════════════════
//  FILTER CONFIG
// ════════════════════════════════════════════
const FILTER_GROUPS = [
  {
    key: 'devTypes',
    label: 'Type',
    options: ['Mobile', 'Full Stack', 'Web', 'Backend'],
    match: (project, values) => values.some(v => project.devTypes.includes(v)),
  },
  {
    key: 'role',
    label: 'Role',
    options: ['Developer', 'Mobile Lead', 'Full-Stack Lead', 'Tech Lead'],
    match: (project, values) => values.includes(project.role),
  },
  {
    key: 'industry',
    label: 'Industry',
    options: ['Fintech', 'Sports', 'On-demand', 'Gov', 'Social'],
    match: (project, values) => values.includes(project.industry),
  },
  {
    key: 'scale',
    label: 'Scale',
    options: ['Solo build', 'Team'],
    match: (project, values) => values.includes(project.scale),
  },
  {
    key: 'stackFilters',
    label: 'Stack',
    options: ['React Native', 'NestJS', 'Next.js', 'GraphQL', 'AWS'],
    match: (project, values) => values.some(v => project.stackFilters.includes(v)),
  },
  {
    key: 'company',
    label: 'Company',
    options: ['Solo', 'Avocado Technologies', 'Allsquare', 'Confidential'],
    match: (project, values) => values.includes(project.company),
  },
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
let activeFilters = {}; // { groupKey: Set<string> }
let searchQuery = '';
FILTER_GROUPS.forEach(g => { activeFilters[g.key] = new Set(); });

// ════════════════════════════════════════════
//  FILTER LOGIC
// ════════════════════════════════════════════
function getFiltered() {
  return PROJECTS.filter(p => {
    // Search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const haystack = [p.title, p.description, p.company, p.industry, ...p.stack, ...p.duties].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    // Each filter group (AND between groups, OR within group)
    for (const g of FILTER_GROUPS) {
      const active = activeFilters[g.key];
      if (active.size === 0) continue;
      if (!g.match(p, [...active])) return false;
    }
    return true;
  });
}

function totalActiveCount() {
  return Object.values(activeFilters).reduce((acc, s) => acc + s.size, 0);
}

// ════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════
function renderFilterGroups(container) {
  container.innerHTML = '';
  FILTER_GROUPS.forEach(group => {
    const wrapper = document.createElement('div');
    wrapper.className = 'mb-5';
    wrapper.innerHTML = `
      <div class="filter-group-header mb-2.5 select-none" data-group="${group.key}">
        <span class="text-white/40 text-xs uppercase tracking-widest font-semibold">${group.label}</span>
        <svg class="chevron w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
      </div>
      <div class="filter-group-content">
        <div class="flex flex-wrap gap-1.5" data-pills="${group.key}"></div>
      </div>
    `;
    const pillsContainer = wrapper.querySelector(`[data-pills="${group.key}"]`);
    group.options.forEach(opt => {
      const pill = document.createElement('button');
      pill.className = 'filter-pill';
      pill.dataset.group = group.key;
      pill.dataset.value = opt;
      pill.innerHTML = `<svg class="pill-check w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>${opt}`;
      pill.addEventListener('click', () => toggleFilter(group.key, opt));
      pillsContainer.appendChild(pill);
    });

    // Header collapse toggle
    wrapper.querySelector('.filter-group-header').addEventListener('click', (e) => {
      if (e.target.closest('[data-pills]')) return;
      const header = wrapper.querySelector('.filter-group-header');
      const content = wrapper.querySelector('.filter-group-content');
      header.classList.toggle('collapsed');
      content.style.maxHeight = header.classList.contains('collapsed') ? '0' : '';
    });

    container.appendChild(wrapper);
  });
}

function syncPills() {
  document.querySelectorAll('.filter-pill').forEach(pill => {
    const g = pill.dataset.group;
    const v = pill.dataset.value;
    pill.classList.toggle('active', activeFilters[g]?.has(v));
  });
}

function renderActiveChips() {
  const container = document.getElementById('active-chips');
  container.innerHTML = '';
  FILTER_GROUPS.forEach(group => {
    activeFilters[group.key].forEach(val => {
      const chip = document.createElement('button');
      chip.className = 'active-chip';
      chip.innerHTML = `<span class="text-white/40 text-xs">${group.label}:</span> ${val}
        <svg class="w-3 h-3 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/></svg>`;
      chip.addEventListener('click', () => toggleFilter(group.key, val));
      container.appendChild(chip);
    });
  });
}

function renderClearButtons() {
  const count = totalActiveCount();
  const clearDesktop = document.getElementById('clear-all-desktop');
  const clearMobileCount = document.getElementById('mobile-filter-count');

  clearDesktop.classList.toggle('hidden', count === 0);
  clearMobileCount.classList.toggle('hidden', count === 0);
  if (count > 0) clearMobileCount.textContent = count;
}

function projectCard(p, index) {
  const detailId = `details-${p.id}`;
  const devTypeBadges = p.devTypes.map(t => `<span class="tag">${t}</span>`).join('');
  const stackChips = p.stack.map(s => `<span class="stack-chip">${s}</span>`).join('');
  const duties = p.duties.map(d => `
    <li class="flex items-start gap-2 text-white/60 text-sm">
      <svg class="w-3.5 h-3.5 text-amber-500/60 flex-shrink-0 mt-1" fill="currentColor" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3"/></svg>
      ${d}
    </li>`).join('');
  const achievements = p.achievements.map(a => `
    <li class="flex items-start gap-2 text-sm text-white/80">
      <svg class="w-4 h-4 text-amber-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      ${a}
    </li>`).join('');

  return `
    <article class="project-card glass rounded-2xl overflow-hidden" style="animation-delay:${index * 0.06}s" data-id="${p.id}">

      <!-- Card header -->
      <div class="p-6 pb-5">
        <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
          <div class="flex-1 min-w-0">
            <div class="flex flex-wrap items-center gap-2 mb-1.5">
              ${devTypeBadges}
              <span class="tag-neutral">${p.productType}</span>
              <span class="tag-neutral">${p.industry}</span>
              ${p.year ? `<span class="text-white/25 text-xs font-mono">${p.year}</span>` : ''}
            </div>
            <h2 class="font-heading font-black text-xl text-white leading-tight">${p.title}</h2>
          </div>

          <!-- Meta column -->
          <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
            <div class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 text-amber-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
              <span class="text-white/60 text-sm font-medium">${p.company}</span>
            </div>
            <div class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 text-amber-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <span class="text-white/60 text-sm">${p.role}</span>
            </div>
            <div class="flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5 text-amber-500/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              <span class="text-white/60 text-sm">Team ${p.teamLabel}</span>
            </div>
          </div>
        </div>

        <!-- Description -->
        <p class="text-white/55 text-sm leading-relaxed">${p.description}</p>

        <!-- Achievements -->
        ${achievements ? `
        <div class="mt-4 glass-amber rounded-xl p-3.5">
          <p class="text-amber-500/70 text-xs uppercase tracking-widest font-bold mb-2">Achievements</p>
          <ul class="space-y-1">${achievements}</ul>
        </div>` : ''}

        <!-- Expand toggle -->
        <button class="expand-btn mt-4 flex items-center gap-2 text-amber-500 text-xs font-semibold hover:text-amber-400 transition-colors cursor-pointer" data-target="${detailId}" aria-expanded="false">
          <svg class="expand-icon w-4 h-4 transition-transform duration-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          Show details
        </button>
      </div>

      <!-- Expandable details -->
      <div id="${detailId}" class="project-details" style="max-height:0">
        <div class="border-t border-white/5 p-6 pt-5 grid sm:grid-cols-2 gap-6">

          <!-- Duties -->
          <div>
            <p class="text-white/30 text-xs uppercase tracking-widest font-semibold mb-3">Duties</p>
            <ul class="space-y-1.5">${duties}</ul>
          </div>

          <!-- Stack + Team detail -->
          <div class="space-y-5">
            <div>
              <p class="text-white/30 text-xs uppercase tracking-widest font-semibold mb-3">Tech Stack</p>
              <div class="flex flex-wrap gap-1.5">${stackChips}</div>
            </div>
            <div>
              <p class="text-white/30 text-xs uppercase tracking-widest font-semibold mb-2">Team Composition</p>
              <p class="text-white/50 text-sm">${p.teamDetail}</p>
            </div>
            <div>
              <p class="text-white/30 text-xs uppercase tracking-widest font-semibold mb-2">Scope</p>
              <p class="text-white/50 text-sm">${p.skills}</p>
            </div>
          </div>
        </div>
      </div>

      ${renderLinks(p)}
    </article>
  `;
}

// ════════════════════════════════════════════
//  LINK RENDERER
// ════════════════════════════════════════════
function renderLinks(p) {
  if (!p.link) return '';
  const { type, webUrl, appStore, googlePlay, label } = p.link;
  let items = '';

  if (type === 'web' || type === 'web+mobile') {
    items += `
      <a href="${webUrl}" target="_blank" rel="noopener noreferrer" class="link-web">
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        Live App
      </a>`;
  }

  if (type === 'mobile' || type === 'web+mobile') {
    if (appStore) {
      items += `
        <a href="${appStore}" target="_blank" rel="noopener noreferrer" class="link-store">
          <svg class="store-icon w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          <span>
            <span class="store-label-top">Download on the</span>
            <span class="store-label-main">App Store</span>
          </span>
        </a>`;
    }
    if (googlePlay) {
      items += `
        <a href="${googlePlay}" target="_blank" rel="noopener noreferrer" class="link-store">
          <svg class="store-icon w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.76c.35.2.74.24 1.12.13l12.5-7.21-2.79-2.79-10.83 9.87zM.64 1.98C.24 2.34 0 2.94 0 3.7v16.6c0 .77.24 1.36.64 1.72l.09.09 9.31-9.31v-.22L.73 3.27.64 3.7v-.04zm20.23 8.85l-2.65-1.53-3.13 3.13 3.13 3.13 2.66-1.54c.76-.44.76-1.15 0-1.59l-.01.4zM4.3.14L16.8 7.35 14 10.14 3.18.27C3.53.06 3.96.1 4.3.34V.14z"/></svg>
          <span>
            <span class="store-label-top">Get it on</span>
            <span class="store-label-main">Google Play</span>
          </span>
        </a>`;
    }
  }

  if (type === 'private') {
    items += `
      <div class="link-private-wrap">
        <span class="link-private">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          ${label || 'Private — NDA'}
        </span>
        <div class="link-private-tooltip">Under NDA · available on request</div>
      </div>`;
  }

  if (!items) return '';
  return `
    <div class="link-strip">
      <span class="link-type-label">Links</span>
      ${items}
    </div>`;
}

// ════════════════════════════════════════════
//  MAIN RENDER
// ════════════════════════════════════════════
function render() {
  const filtered = getFiltered();
  const list = document.getElementById('projects-list');
  const emptyState = document.getElementById('empty-state');
  const resultCount = document.getElementById('result-count');
  const navCount = document.getElementById('nav-count');

  list.innerHTML = filtered.map((p, i) => projectCard(p, i)).join('');
  emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  list.style.display = filtered.length === 0 ? 'none' : '';

  const label = filtered.length === 1 ? 'project' : 'projects';
  resultCount.textContent = `Showing ${filtered.length} ${label}`;
  navCount.textContent = filtered.length;

  syncPills();
  renderActiveChips();
  renderClearButtons();

  // Re-attach expand listeners
  list.querySelectorAll('.expand-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = document.getElementById(btn.dataset.target);
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      const label = btn.querySelector('span') || btn;
      if (expanded) {
        target.style.maxHeight = '0';
        btn.setAttribute('aria-expanded', 'false');
        btn.querySelector('.expand-icon').style.transform = '';
        btn.innerHTML = btn.innerHTML.replace('Hide details', 'Show details');
      } else {
        target.style.maxHeight = target.scrollHeight + 'px';
        btn.setAttribute('aria-expanded', 'true');
        btn.querySelector('.expand-icon').style.transform = 'rotate(180deg)';
        btn.innerHTML = btn.innerHTML.replace('Show details', 'Hide details');
      }
    });
  });
}

// ════════════════════════════════════════════
//  TOGGLE FILTER
// ════════════════════════════════════════════
function toggleFilter(groupKey, value) {
  const s = activeFilters[groupKey];
  s.has(value) ? s.delete(value) : s.add(value);
  render();
}

function clearAllFilters() {
  FILTER_GROUPS.forEach(g => activeFilters[g.key].clear());
  document.getElementById('search-input').value = '';
  searchQuery = '';
  render();
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
renderFilterGroups(document.getElementById('desktop-filter-groups'));
renderFilterGroups(document.getElementById('mobile-filter-groups'));
render();

// Search
document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  render();
});

// Clear all
['clear-all-desktop', 'clear-all-mobile', 'clear-all-empty'].forEach(id => {
  document.getElementById(id)?.addEventListener('click', clearAllFilters);
});

// Mobile panel
const overlay = document.getElementById('filter-overlay');
const panel = document.getElementById('filter-panel-mobile');
document.getElementById('mobile-filter-toggle').addEventListener('click', () => {
  overlay.classList.add('open');
  panel.classList.add('open');
  document.body.style.overflow = 'hidden';
});
function closePanel() {
  overlay.classList.remove('open');
  panel.classList.remove('open');
  document.body.style.overflow = '';
}
overlay.addEventListener('click', closePanel);
document.getElementById('close-mobile-filter').addEventListener('click', closePanel);
</script>
</body>
